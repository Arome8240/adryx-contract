name: Generate Transactions

on:
  push:
    branches:
      - main

jobs:
  generate-transactions:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: adryx-contract

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: adryx-contract/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run generate-100-txs
        run: pnpm tsx scripts/generate-100-txs.ts
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RECIPIENT_ADDRESS: ${{ vars.RECIPIENT_ADDRESS }}
          TX_COUNT: ${{ vars.TX_COUNT || '50' }}
          FEE: ${{ vars.FEE || '6000' }}
          DELAY_MS: ${{ vars.DELAY_MS || '5000' }}
          PAUSE_ON_RATE_LIMIT_MS: ${{ vars.PAUSE_ON_RATE_LIMIT_MS || '30000' }}
          AMOUNT_PER_TX: ${{ vars.AMOUNT_PER_TX || '1000000' }}
          STACKS_API_URL: ${{ vars.STACKS_API_URL }}
