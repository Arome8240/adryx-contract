name: Generate Transactions

on:
  push:
    branches:
      - main

jobs:
  generate-transactions:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run generate-transactions
        run: pnpm gen-txs
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          STACKS_NETWORK: ${{ vars.STACKS_NETWORK || 'mainnet' }}
          CONTRACT_ADDRESS: ${{ vars.CONTRACT_ADDRESS ||
            'SP25H46Z9YCAB1TW93YG42WM0SREG9SC5EZB977TJ' }}
          RECIPIENT_ADDRESS: ${{ vars.RECIPIENT_ADDRESS }}
          TX_COUNT: ${{ vars.TX_COUNT || '100' }}
          FEE: ${{ vars.FEE || '6000' }}
          DELAY_MS: ${{ vars.DELAY_MS || '5000' }}
          PAUSE_ON_RATE_LIMIT_MS: ${{ vars.PAUSE_ON_RATE_LIMIT_MS || '30000' }}
          STACKS_API_URL: ${{ vars.STACKS_API_URL }}
